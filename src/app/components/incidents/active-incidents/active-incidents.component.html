<div class="container-fluid" [class.incidents-page]="showHeader" [class.p-4]="showHeader">
  @if (showHeader) {
    <h1 class="incidents-page-title">All Incidents</h1>

    <!-- Summary KPI cards: Total (no action), Open / Resolved / Archived (click = apply filter) -->
    @if (!assetId) {
      <div class="incidents-summary-cards">
        <div class="incident-kpi-card incident-kpi-card--total">
          <span class="incident-kpi-value">{{ summaryTotal() }}</span>
          <span class="incident-kpi-label">Total Incidents</span>
        </div>
        <button type="button" class="incident-kpi-card incident-kpi-card--clickable"
          (click)="onSummaryTileClick('open')" aria-label="Filter by Open">
          <span class="incident-kpi-value">{{ summaryOpen() }}</span>
          <span class="incident-kpi-label">Open</span>
        </button>
        <button type="button" class="incident-kpi-card incident-kpi-card--clickable"
          (click)="onSummaryTileClick('resolved')" aria-label="Filter by Resolved">
          <span class="incident-kpi-value">{{ summaryResolved() }}</span>
          <span class="incident-kpi-label">Resolved</span>
        </button>
        <button type="button" class="incident-kpi-card incident-kpi-card--clickable"
          (click)="onSummaryTileClick('archived')" aria-label="Filter by Archived">
          <span class="incident-kpi-value">{{ summaryArchived() }}</span>
          <span class="incident-kpi-label">Archived</span>
        </button>
      </div>
    }
  }

  <div class="incidents-content" [class.incidents-content--with-header]="showHeader">
    @if (!hasRouteQueryParams || filtersReady()) {
      @if (showHeader) {
        <div id="incidents-table" class="dashboard-table-section">
          <div class="table-section-card">
            <app-reusable-table
              [config]="tableConfigWithData()"
              [filters]="displayFilters()"
              (searchQuery)="loadIncidents($event)"
              [totalItems]="totalItems()"
              (actionClick)="onCheckIncident($event)"
            >
            </app-reusable-table>
          </div>
        </div>
      } @else {
        <app-reusable-table
          [config]="tableConfigWithData()"
          [filters]="displayFilters()"
          (searchQuery)="loadIncidents($event)"
          [totalItems]="totalItems()"
          (actionClick)="onCheckIncident($event)"
        >
        </app-reusable-table>
      }
    }
  </div>
</div>
