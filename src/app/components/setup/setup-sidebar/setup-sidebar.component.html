<aside class="sidebar-card" aria-label="Setup sidebar">
  <div class="sidebar-user">
    <div class="avatar" aria-hidden="true">
      @if (user.avatarUrl) {
        <img class="avatar-img" [src]="user.avatarUrl" alt="" />
      } @else {
        {{ initials(user.name || 'Username') }}
      }
    </div>
    <div class="user-meta">
      <div class="user-name">{{ user.name || 'Username' }}</div>
      <div class="user-role">{{ user.role || 'Admin' }}</div>
    </div>
  </div>

  <nav class="sidebar-nav" aria-label="Setup navigation">
    <a
      class="nav-item"
      *ngFor="let it of items; trackBy: trackByRoute"
      [routerLink]="it.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: it.route === '/setup' }"
    >
      <span class="nav-icon" aria-hidden="true">
        @switch (it.icon ?? 'settings') {
          @case ('grid') {
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 2.5H3.33333C2.8731 2.5 2.5 2.8731 2.5 3.33333V9.16667C2.5 9.6269 2.8731 10 3.33333 10H7.5C7.96024 10 8.33333 9.6269 8.33333 9.16667V3.33333C8.33333 2.8731 7.96024 2.5 7.5 2.5Z" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16.6641 2.5H12.4974C12.0372 2.5 11.6641 2.8731 11.6641 3.33333V5.83333C11.6641 6.29357 12.0372 6.66667 12.4974 6.66667H16.6641C17.1243 6.66667 17.4974 6.29357 17.4974 5.83333V3.33333C17.4974 2.8731 17.1243 2.5 16.6641 2.5Z" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16.6641 10H12.4974C12.0372 10 11.6641 10.3731 11.6641 10.8333V16.6667C11.6641 17.1269 12.0372 17.5 12.4974 17.5H16.6641C17.1243 17.5 17.4974 17.1269 17.4974 16.6667V10.8333C17.4974 10.3731 17.1243 10 16.6641 10Z" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M7.5 13.334H3.33333C2.8731 13.334 2.5 13.7071 2.5 14.1673V16.6673C2.5 17.1276 2.8731 17.5007 3.33333 17.5007H7.5C7.96024 17.5007 8.33333 17.1276 8.33333 16.6673V14.1673C8.33333 13.7071 7.96024 13.334 7.5 13.334Z" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('building') {
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5.00033 18.3334V3.33341C5.00033 2.89139 5.17592 2.46746 5.48848 2.1549C5.80104 1.84234 6.22496 1.66675 6.66699 1.66675H13.3337C13.7757 1.66675 14.1996 1.84234 14.5122 2.1549C14.8247 2.46746 15.0003 2.89139 15.0003 3.33341V18.3334M5.00033 18.3334H15.0003M5.00033 18.3334H3.33366C2.89163 18.3334 2.46771 18.1578 2.15515 17.8453C1.84259 17.5327 1.66699 17.1088 1.66699 16.6667V11.6667C1.66699 11.2247 1.84259 10.8008 2.15515 10.4882C2.46771 10.1757 2.89163 10.0001 3.33366 10.0001H5.00033M15.0003 18.3334H16.667C17.109 18.3334 17.5329 18.1578 17.8455 17.8453C18.1581 17.5327 18.3337 17.1088 18.3337 16.6667V9.16675C18.3337 8.72472 18.1581 8.3008 17.8455 7.98824C17.5329 7.67568 17.109 7.50008 16.667 7.50008H15.0003M8.33366 5.00008H11.667M8.33366 8.33341H11.667M8.33366 11.6667H11.667M8.33366 15.0001H11.667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('users') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          }
          @default {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          }
        }
      </span>
      <span class="nav-label">{{ it.label }}</span>
    </a>
  </nav>
</aside>
