<div class="add-vendor-page container-fluid p-4">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    
    <div class="row">
      <div class="col-md-2 col-sm-12"></div>
      <div class="col-md-8 col-sm-12">
        <h1 class="page-title">{{ pageTitle }}</h1>
        <p class="page-subtitle">{{ pageSubtitle }}</p>
        <div class="form-card">
          <div class="form-section">
            <h2 class="section-title">Basic Information</h2>
            <div class="info-box">
              <mat-icon class="info-icon">info</mat-icon>
              <span class="info-text">Provide the essential details to identify and categorize your vendor.</span>
            </div>

            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <app-reusable-input
                  label="Vendor Name"
                  type="text"
                  placeholder="Vendor Name"
                  hint="Enter the vendor name"
                  [control]="getControl('vendorName')">
                </app-reusable-input>
              </div>

              <div class="col-md-6">
                <app-reusable-input
                  label="Website"
                  type="text"
                  placeholder="Website"
                  hint="Enter the vendor website"
                  [control]="getControl('vendorWebsite')">
                </app-reusable-input>
              </div>

              <div class="col-md-6">
                <app-reusable-input
                  label="Email"
                  type="email"
                  placeholder="Email ID"
                  hint="Enter the Email id"
                  [control]="getControl('vendorEmail')">
                </app-reusable-input>
              </div>

              <div class="col-md-6">
                <app-reusable-input
                  label="Phone"
                  type="text"
                  placeholder="Enter Phone Number"
                  hint="Enter phone number"
                  [control]="getControl('vendorPhone')">
                </app-reusable-input>
              </div>

              <div class="col-md-6">
                <app-reusable-input
                  label="Vendor Type"
                  type="select"
                  placeholder="Vendor Type"
                  hint="Select the vendor type"
                  [options]="vendorTypeOptions"
                  [control]="getControl('vendorTypeId')">
                </app-reusable-input>
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn-cancel" (click)="onCancel()" [disabled]="submitting()">Cancel</button>
            <button type="submit" class="btn btn-primary btn-submit" [disabled]="submitting() || loadingLookups()">{{ submitLabel }}</button>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
