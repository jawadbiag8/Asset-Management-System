<header class="header">
  <!-- LEFT: Logo (design: icon | divider | Gov OS + CX Dashboards, dotted line behind) -->
  <div class="left">
    <div class="logo pointer" routerLink="/dashboard">
      <img src="/assets/logo.svg" alt="Gov OS" class="logo-img" />
      <span class="logo-title"><span class="logo-title-main">Gov</span><span class="logo-title-alt">OS</span></span>
      <span class="logo-divider" aria-hidden="true"></span>
      <span class="logo-subtitle">CX Dashboards</span>
    </div>
  </div>

  <!-- RIGHT: Menu (nav) + Executive Dashboard + Profile -->
  <div class="right">
    <nav class="nav" [class.open]="menuOpen">
      <a href="/dashboard" (click)="onHeaderNav('/dashboard'); $event.preventDefault()" [class.active]="isDashboardActive()">Dashboard</a>
      <a href="/asset" (click)="onHeaderNav('/asset'); $event.preventDefault()" [class.active]="isAssetsActive()">Assets</a>
      <a href="/ministries" (click)="onHeaderNav('/ministries'); $event.preventDefault()" [class.active]="isMinistriesActive()">Ministries</a>
      <a href="/incidents" (click)="onHeaderNav('/incidents'); $event.preventDefault()" [class.active]="isIncidentsActive()">Incidents</a>
      <a href="/reports" (click)="onHeaderNav('/reports'); $event.preventDefault()" [class.active]="isReportsActive()">Reports</a>

      <a
        *ngIf="isPmoExecutive() && !isPmDashboardActive()"
        href="/pm-dashboard"
        (click)="onHeaderNav('/pm-dashboard'); $event.preventDefault()"
        [class.active]="isPmDashboardActive()"
        class="mobile-executive-dashboard"
      >
        <img src="/Images/Dashboard/windows.svg" alt="pm icon" class="nav-icon" />
        Executive Dashboard
      </a>

      <button type="button" class="action-btn mobile-logout" (click)="logout(); $event.stopPropagation()">
        <img src="/Images/Dashboard/log-out.svg" alt="logout icon" />
        Logout
      </button>
    </nav>

    <button
      class="pm-btn"
      *ngIf="isPmoExecutive() && !isPmDashboardActive()"
      (click)="navigateToPmDashboard()"
    >
      <img src="/Images/Dashboard/windows.svg" alt="pm icon" class="pm-icon" />
      Executive Dashboard
    </button>

    <div class="profile-dropdown" #profileDropdown>
      <div class="profile-trigger" (click)="toggleProfileDropdown()">
        <div class="profile-icon">
          <span class="profile-initials" aria-hidden="true">{{ getInitials() }}</span>
        </div>
        <div class="profile-info">
          <span class="username">{{ user().name }}</span>
          <span class="user-role">{{ user().role }}</span>
        </div>
        <svg class="dropdown-arrow" [class.open]="profileDropdownOpen" width="12" height="8" viewBox="0 0 12 8" fill="none">
          <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>

      <div class="dropdown-menu" [class.open]="profileDropdownOpen">
        <button type="button" class="dropdown-item" (mousedown)="navigateToSetup(); $event.stopPropagation()">
          <svg class="dropdown-item-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Setup</span>
        </button>
        <button type="button" class="dropdown-item logout-item" (mousedown)="logout(); $event.stopPropagation()">
          <img src="/Images/Dashboard/log-out.svg" alt="logout icon" />
          <span>Logout</span>
        </button>
      </div>
    </div>

    <button class="menu-btn" (click)="menuOpen = !menuOpen">&#9776;</button>
  </div>
</header>
